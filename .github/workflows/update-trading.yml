name: Update Trading Data

on:
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: '3,18,33,48 * * * *' # Every 15 minutes (at :03, :18, :33, :48)

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout pages repo
        uses: actions/checkout@v4

      - name: Checkout generator repo
        uses: actions/checkout@v4
        with:
          repository: scpages/trading
          path: generator

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate HTML
        working-directory: generator
        run: |
          chmod +x main.sh
          ./main.sh

      - name: Copy generated files
        run: |
          mkdir -p docs/trading
          cp generator/index.html docs/trading/index.html
          cp generator/default.css docs/trading/default.css
          date -u +"%Y-%m-%d %H:%M:%S UTC" > docs/trading/.last-update

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/trading/
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update trading data" && git push)
