name: Update Default Loadouts

on:
  workflow_dispatch: # Manual trigger
  schedule:
    - cron: '7 12 * * *' # Daily at 12:07 UTC

jobs:
  generate-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout generator repo
        uses: actions/checkout@v4
        with:
          repository: scpages/default_loadout
          path: generator

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate HTML
        working-directory: generator
        run: |
          chmod +x main.sh
          ./main.sh

      - name: Checkout pages repo
        uses: actions/checkout@v4
        with:
          repository: scpages/scpages.github.io
          path: pages
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Copy generated file
        run: |
          mkdir -p pages/docs/default-loadouts
          cp generator/index.html pages/docs/default-loadouts/index.html

      - name: Commit and push
        working-directory: pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/default-loadouts/index.html
          git diff --quiet && git diff --staged --quiet || (git commit -m "Update default ship loadouts" && git push)
